app = "lucidly-app"
primary_region = "lhr"

[build]

[env]
  NODE_ENV = "production"
  DATABASE_URL = "file:/data/lucidly.db"
  PORT = "3000"
  # Public distribution must use expiring offline tokens (Shopify rejects
  # non-expiring tokens on the Admin API with a 403). Gated here so the custom
  # apps (fly.toml / fly.hm.toml) keep non-expiring tokens and avoid the
  # library's unlocked webhook-path refresh race. See shopify.server.ts.
  EXPIRING_OFFLINE_TOKENS = "true"
  # Ops alerting: the Token Health Watchdog + refresh-failure hook email here when
  # an offline token faults (non-expiring 403 / revoked 401 / refresh race). Needs
  # RESEND_API_KEY set as a Fly secret to actually deliver; no-ops otherwise.
  OPS_ALERT_EMAIL = "see.lucidly@gmail.com"
  # Verified Resend sending domain (seelucidly.com). All app email (ops alerts +
  # merchant onboarding) sends from here; DKIM/SPF verified so it won't spam-file.
  LUCIDLY_FROM_EMAIL = "Lucidly <hello@seelucidly.com>"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  # Rightsized 2026-07-04 from 4x/8GB: 7-day peak was 1.21GB RAM / 3% of 4 vCPUs.
  # Revisit upward as real public-app merchants install.
  size = "shared-cpu-2x"
  memory = "4096mb"

[mounts]
  source = "lucidly_app_data"
  destination = "/data"

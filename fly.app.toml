app = "lucidly-app"
primary_region = "lhr"

[build]

[env]
  NODE_ENV = "production"
  DATABASE_URL = "file:/data/lucidly.db"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-4x"
  memory = "8192mb"

[mounts]
  source = "lucidly_app_data"
  destination = "/data"

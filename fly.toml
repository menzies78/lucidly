app = "lucidly"
primary_region = "lhr"

[build]

[env]
  NODE_ENV = "production"
  DATABASE_URL = "file:/data/lucidly.db"
  PORT = "3000"
  # Internal app (Vollebak): show the web-pixel journey report tiles that are
  # still being validated. Absent on the public app (fly.app.toml) so public
  # merchants/reviewers don't see them.
  JOURNEY_REPORTS_ENABLED = "true"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-4x"
  memory = "8192mb"

[mounts]
  source = "lucidly_data"
  destination = "/data"

app = "lucidly"
primary_region = "lhr"

[build]

[env]
  NODE_ENV = "production"
  DATABASE_URL = "file:/data/lucidly.db"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-2x"
  memory = "4096mb"

[mounts]
  source = "lucidly_data"
  destination = "/data"

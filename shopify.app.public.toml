# Public-distribution app (lucidly-1). Backend: lucidly.fly.dev.
# Mirrors shopify.app.toml; only client_id differs (new public app).
# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "f80af9e2ef381f1bcc36e62ddb457265"
name = "Lucidly"
application_url = "https://lucidly.fly.dev"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "orders/updated" ]
  uri = "/webhooks/orders/updated"

  # GDPR / Shopify Privacy mandatory webhooks. Required for Public App Store
  # listing. Each topic has its own route under app/routes/webhooks.*.tsx.
  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request" ]
  uri = "/webhooks/customers/data_request"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/redact" ]
  uri = "/webhooks/customers/redact"

  [[webhooks.subscriptions]]
  compliance_topics = [ "shop/redact" ]
  uri = "/webhooks/shop/redact"

[access_scopes]
scopes = "read_orders,read_all_orders,read_customers,read_products"

[auth]
redirect_urls = [ "https://lucidly.fly.dev/auth/callback", "https://lucidly.fly.dev/auth/shopify/callback", "https://lucidly.fly.dev/api/auth/callback" ]

[access.customer_data]
reason = "App provides order attribution and customer lifetime value analytics"

  [[access.customer_data.fields]]
  data_category = "name"

  [[access.customer_data.fields]]
  data_category = "email"

  [[access.customer_data.fields]]
  data_category = "orders"

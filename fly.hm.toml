app = "lucidly-hm"
primary_region = "lhr"

[build]

[env]
  NODE_ENV = "production"
  DATABASE_URL = "file:/data/lucidly.db"
  PORT = "3000"
  # Internal app (Hayley Menzies): show the web-pixel journey report tiles that
  # are still being validated. Absent on the public app (fly.app.toml) so public
  # merchants/reviewers don't see them.
  JOURNEY_REPORTS_ENABLED = "true"
  # Ops alerting: the Token Health Watchdog + refresh-failure hook email here when
  # an offline token faults. Needs RESEND_API_KEY as a Fly secret to deliver.
  OPS_ALERT_EMAIL = "see.lucidly@gmail.com"
  # Verified Resend sending domain (seelucidly.com). All app email sends from here.
  LUCIDLY_FROM_EMAIL = "Lucidly <hello@seelucidly.com>"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  # Rightsized 2026-07-04 from 4x/8GB: 7-day peak was 1.02GB RAM / 6% of 4 vCPUs.
  size = "shared-cpu-2x"
  memory = "4096mb"

[mounts]
  source = "lucidly_hm_data"
  destination = "/data"

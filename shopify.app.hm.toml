# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "ae0381a3a3068aca25a55ee30d764cce"
name = "Lucidly HM"
application_url = "https://lucidly-hm.fly.dev"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "orders/updated" ]
  uri = "/webhooks/orders/updated"

  # GDPR / Shopify Privacy mandatory webhooks. Required for Public App Store
  # listing. Each topic has its own route under app/routes/webhooks.*.tsx.
  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request" ]
  uri = "/webhooks/customers/data_request"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/redact" ]
  uri = "/webhooks/customers/redact"

  [[webhooks.subscriptions]]
  compliance_topics = [ "shop/redact" ]
  uri = "/webhooks/shop/redact"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_orders,read_all_orders,read_customers,read_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://lucidly-hm.fly.dev/auth/callback",
  "https://lucidly-hm.fly.dev/auth/shopify/callback",
  "https://lucidly-hm.fly.dev/api/auth/callback"
]

[access.customer_data]
reason = "App provides order attribution and customer lifetime value analytics"

  [[access.customer_data.fields]]
  data_category = "name"

  [[access.customer_data.fields]]
  data_category = "email"
